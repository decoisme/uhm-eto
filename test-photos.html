<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Photos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #000;
            color: #fff;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .photo-item {
            border: 2px solid #333;
            padding: 10px;
            text-align: center;
        }
        .photo-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #333;
        }
        .error {
            color: #ff4fa2;
        }
        .success {
            color: #10b981;
        }
    </style>
</head>
<body>
    <h1>📸 Photo Path Tester</h1>
    <p>Testing 44 photos from gambar folder...</p>
    <div id="results"></div>
    <div class="photo-grid" id="photoGrid"></div>

    <script>
        const totalPhotos = 44;
        const results = document.getElementById('results');
        const grid = document.getElementById('photoGrid');
        
        let loaded = 0;
        let errors = 0;

        for (let i = 1; i <= totalPhotos; i++) {
            const photoUrl = `gambar/${i}.jpeg`;
            const img = new Image();
            
            const photoItem = document.createElement('div');
            photoItem.className = 'photo-item';
            photoItem.innerHTML = `
                <img src="${photoUrl}" alt="Photo ${i}">
                <div id="status-${i}">Loading...</div>
            `;
            grid.appendChild(photoItem);
            
            img.onload = function() {
                loaded++;
                document.getElementById(`status-${i}`).innerHTML = `<span class="success">✅ ${i}.jpeg</span>`;
                updateResults();
            };
            
            img.onerror = function() {
                errors++;
                document.getElementById(`status-${i}`).innerHTML = `<span class="error">❌ Not found</span>`;
                updateResults();
            };
            
            img.src = photoUrl;
        }

        function updateResults() {
            results.innerHTML = `
                <h2>Results:</h2>
                <p class="success">✅ Loaded: ${loaded} / ${totalPhotos}</p>
                <p class="error">❌ Errors: ${errors} / ${totalPhotos}</p>
            `;
        }
    </script>
</body>
</html>
