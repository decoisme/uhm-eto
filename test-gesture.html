<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Test</title>
    <style>
        body {
            font-family: monospace;
            background: #000;
            color: #0f0;
            padding: 20px;
        }
        .log {
            margin: 5px 0;
            padding: 5px;
            background: #111;
            border-left: 3px solid #0f0;
        }
        .error {
            border-left-color: #f00;
            color: #f00;
        }
        .warning {
            border-left-color: #ff0;
            color: #ff0;
        }
    </style>
</head>
<body>
    <h1>🔍 Gesture Error Debugger</h1>
    <p>Check console (F12) for detailed errors</p>
    <div id="logs"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const logsDiv = document.getElementById('logs');

        // Override console methods
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog('log', args.join(' '));
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            addLog('error', args.join(' '));
        };

        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addLog('warning', args.join(' '));
        };

        function addLog(type, message) {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.insertBefore(div, logsDiv.firstChild);
            
            // Keep only last 50 logs
            while (logsDiv.children.length > 50) {
                logsDiv.removeChild(logsDiv.lastChild);
            }
        }

        // Test basic functionality
        console.log('🚀 Starting tests...');

        // Test 1: Check if script.js loads
        try {
            const script = document.createElement('script');
            script.src = 'script.js';
            script.onerror = () => {
                console.error('❌ Failed to load script.js');
            };
            script.onload = () => {
                console.log('✅ script.js loaded successfully');
                
                // Test 2: Check critical variables
                setTimeout(() => {
                    console.log('Testing critical variables...');
                    
                    if (typeof photos !== 'undefined') {
                        console.log('✅ photos array:', photos.length, 'photos');
                    } else {
                        console.error('❌ photos array not defined');
                    }
                    
                    if (typeof textureCache !== 'undefined') {
                        console.log('✅ textureCache defined');
                    } else {
                        console.error('❌ textureCache not defined');
                    }
                    
                    if (typeof preloadNearbyPhotos !== 'undefined') {
                        console.log('✅ preloadNearbyPhotos function exists');
                        
                        // Try calling it
                        try {
                            // Don't actually call, just check it exists
                            console.log('✅ Function is callable');
                        } catch(e) {
                            console.error('❌ Error calling preloadNearbyPhotos:', e.message);
                        }
                    } else {
                        console.error('❌ preloadNearbyPhotos function not defined');
                    }
                    
                    if (typeof startSlideshow !== 'undefined') {
                        console.log('✅ startSlideshow function exists');
                    } else {
                        console.error('❌ startSlideshow not defined');
                    }
                    
                    console.log('📊 Test complete!');
                }, 1000);
            };
            document.body.appendChild(script);
        } catch(e) {
            console.error('❌ Critical error:', e.message);
        }

        // Catch all errors
        window.onerror = function(msg, url, line, col, error) {
            console.error(`❌ Runtime Error at ${line}:${col}: ${msg}`);
            if (error && error.stack) {
                console.error('Stack:', error.stack);
            }
            return false;
        };

        // Catch unhandled promise rejections
        window.onunhandledrejection = function(event) {
            console.error('❌ Unhandled Promise Rejection:', event.reason);
        };
    </script>
</body>
</html>
